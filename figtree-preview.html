<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage Figtree Preview</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(22, 119, 190, 0.18), transparent 38%),
        #080f1a;
      color: #f4f7fb;
      font: 500 16px/1.5 "Figtree", system-ui, sans-serif;
    }

    .preview-status {
      padding: 1rem 1.25rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(8, 15, 26, 0.72);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(14px);
    }
  </style>
</head>
<body>
  <div class="preview-status">Loading homepage preview with Figtree…</div>

  <script>
    (async function loadPreview() {
      const previewCss = `
        :root {
          --font-serif: 'Figtree', system-ui, sans-serif !important;
          --font-sans: 'Figtree', system-ui, sans-serif !important;
        }

        h1,
        h2,
        h3,
        .nav__logo,
        .proof__highlight-score,
        .proof__item-score,
        .course-tier__price,
        .course-tier__currency,
        .how__item-num,
        .selector__panel h3 {
          font-family: 'Figtree', system-ui, sans-serif !important;
          letter-spacing: -0.035em !important;
        }

        h1,
        h2 {
          font-weight: 700 !important;
          line-height: 0.95 !important;
        }

        h3,
        .course-tier__price,
        .proof__highlight-score,
        .proof__item-score,
        .how__item-num {
          font-weight: 700 !important;
        }

        .hero__headline {
          max-width: 11ch;
        }

        .label,
        .hero__urgency-text,
        .btn,
        .nav__links a,
        .nav__dropdown-trigger {
          letter-spacing: 0 !important;
        }

        .figtree-preview-badge {
          position: fixed;
          right: 20px;
          bottom: 20px;
          z-index: 9999;
          display: inline-flex;
          align-items: center;
          gap: 10px;
          padding: 14px 18px;
          border: 1px solid rgba(255, 255, 255, 0.14);
          border-radius: 18px;
          background: rgba(8, 15, 26, 0.78);
          box-shadow: 0 20px 48px rgba(0, 0, 0, 0.28);
          color: #f4f7fb;
          font: 600 14px/1.3 'Figtree', system-ui, sans-serif;
          backdrop-filter: blur(14px);
        }

        .figtree-preview-badge strong {
          display: block;
          color: #ffffff;
          font-size: 15px;
        }

        .figtree-preview-badge span {
          display: block;
          color: rgba(244, 247, 251, 0.78);
        }

        @media (max-width: 720px) {
          .figtree-preview-badge {
            right: 12px;
            bottom: 12px;
            left: 12px;
            width: auto;
          }
        }
      `;

      try {
        const response = await fetch('/index.html', { cache: 'no-store' });
        if (!response.ok) throw new Error('Could not load homepage source');

        let html = await response.text();

        html = html.replace(
          /<p class="hero__sub reveal reveal--delay-2">[\s\S]*?<\/p>/i,
          `<p class="hero__sub reveal reveal--delay-2">
          Get a proven GAMSAT system for Section 1 and 2, built to help overwhelmed students study smarter, write better, and improve with clear strategy instead of trial and error.
        </p>`
        );

        html = html.replace(
          /<title>[\s\S]*?<\/title>/i,
          "<title>Rohan's GAMSAT | Homepage Preview in Figtree</title>"
        );

        if (!/family=Figtree/i.test(html)) {
          html = html.replace(
            /<\/head>/i,
            '<link rel="preconnect" href="https://fonts.googleapis.com">' +
            '<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>' +
            '<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">' +
            '</head>'
          );
        }

        html = html.replace(
          /<\/head>/i,
          '<style id="figtree-preview-style">' + previewCss + '</style></head>'
        );

        html = html.replace(
          /<\/body>/i,
          '<div class="figtree-preview-badge" aria-hidden="true">' +
            '<div><strong>Figtree Preview</strong><span>Homepage loaded with a sans-forward typography override.</span></div>' +
          '</div></body>'
        );

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<div class="preview-status">Preview failed to load. Please refresh and try again.</div>';
        console.error(error);
      }
    }());
  </script>
</body>
</html>
